name: Update Helm Values

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        default: 'latest'

jobs:
  update-helm:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: rakeshh1990/my-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Determine image tag
        id: image-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            TAG="${BRANCH}-${SHA:0:7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update Helm values
        run: |
          cd gitops
          REGISTRY="ghcr.io"
          IMAGE_PREFIX="rakeshh1990/my-ai-agent"
          VALUES_FILE=values/ai-agent-assistant.yaml

          # Only touch the assistant block - leave ollama untouched
          yq -i '.workload.image.repository = "'"$REGISTRY/$IMAGE_PREFIX"'"' "$VALUES_FILE"
          yq -i '.workload.image.tag = "'"${{ steps.image-tag.outputs.tag }}"'"' "$VALUES_FILE"

          echo "Updated "$VALUES_FILE":"
          yq '.assistant.image' "$VALUES_FILE"

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v5
        with:
          path: gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          commit-message: "chore: update assistant image to ${{ steps.image-tag.outputs.tag }}"
          title: "🚀 Update assistant image to ${{ steps.image-tag.outputs.tag }}"
          body: |
            ## 📦 Image Update
            
            **New Image Tag:** `${{ steps.image-tag.outputs.tag }}`
            
            This PR was auto-generated by the CI/CD pipeline.
            
            ### Changes
            - Updated `values/ai-agent-assistant.yaml` with new image tag
            - Image will be pulled from `ghcr.io/${{ github.repository }}:${{ steps.image-tag.outputs.tag }}`
            
            ### Next Steps
            1. Review the changes
            2. Merge to `main` branch
            3. ArgoCD will auto-sync the deployment
            
            ---
            *Auto-generated by GitHub Actions*
          branch: "ci/update-image-${{ steps.image-tag.outputs.tag }}"
          delete-branch: true

      - name: Auto-merge Pull Request
        if: steps.create-pr.outputs.pull-request-number != ''
        run: |
          gh pr merge "${{ steps.create-pr.outputs.pull-request-number }}" \
            --repo rakeshh1990/my-gitops \
            --merge \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
