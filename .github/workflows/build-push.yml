name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      registry:
        description: 'Docker Registry (dockerhub or ghcr)'
        required: true
        default: 'ghcr'
        type: choice
        options:
          - dockerhub
          - ghcr

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: assistant

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine registry
        id: registry
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REGISTRY_TYPE="${{ github.event.inputs.registry }}"
          else
            REGISTRY_TYPE="ghcr"
          fi
          
          if [[ "$REGISTRY_TYPE" == "dockerhub" ]]; then
            echo "registry=${{ env.REGISTRY_DOCKERHUB }}" >> $GITHUB_OUTPUT
            echo "username=${{ secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_OUTPUT
            echo "password=${{ secrets.DOCKERHUB_TOKEN }}" >> $GITHUB_OUTPUT
            echo "image_prefix=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
          else
            echo "registry=${{ env.REGISTRY_GHCR }}" >> $GITHUB_OUTPUT
            echo "username=${{ github.actor }}" >> $GITHUB_OUTPUT
            echo "password=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
            echo "image_prefix=${{ github.repository }}" >> $GITHUB_OUTPUT
          fi
          echo "type=$REGISTRY_TYPE" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ steps.registry.outputs.username }}
          password: ${{ steps.registry.outputs.password }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.registry }}/${{ steps.registry.outputs.image_prefix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./assistant
          file: ./assistant/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image information
        run: |
          echo "Registry: ${{ steps.registry.outputs.type }}"
          echo "Image: ${{ steps.registry.outputs.registry }}/${{ steps.registry.outputs.image_prefix }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  notify-gitops:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Trigger GitOps update
        run: |
          echo "Image built and pushed successfully!"
          echo "Tags: ${{ needs.build.outputs.image-tag }}"
          echo "Next step: Update Helm values in GitOps repository"
